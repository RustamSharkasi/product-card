<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>

<body>
  <div class="container">
    <div class="container__buttons">
      <button id="change-color-all-cards">Изменить цвет всех карточек</button>
      <button id="change-color-first-card">Изменить цвет первой карточки</button>
      <button id="open-google">Открыть страницу Google.com</button>
      <button id="output-console-log">Вывести сооющение в консоль лог</button>
      <button id="change-color-button">Изменить цвет кнопки</button>
    </div>
    <div class="container__bg-dandelision">
      <img src="img/background_decor.png" alt="dandelision" width="790px" height="697px">
    </div>
    <h1 class='container__title'>Выбери свой продукт</h1>
    <div class="container__products products" id="product-list">
      <template id="product-template">
        <div class="product__item card">
          <img class="card__img"></img>
          <p class="card__subtitle"></p>
          <h2 class="card__title"></h2>
          <p class="card__descr"></p>
          <div class="card__compound">
            <p class="compound__text">Состав:</p>
            <ul class="compound__list">
              <li class="compound__item1"></li>
              <li class="compound__item2"></li>
              <li class="compound__item3"></li>
            </ul>
            <div class="card_price price">
              <p class="price__text">Цена:</p>
              <p class="price__value"></p>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>
  <script src="main.js"></script>
  <script src="homework-7.js"></script>
  <script src="homework-8.js"></script>
  <script type="module" src="homework-9.js"></script>
  <script type="module" src="comments.js"></script>
  <script type="module" src="homework-10.js"></script>
  <script type="module" src="product-cards.js"></script>
</body>

</html>
